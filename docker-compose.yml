services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mealplan
      POSTGRES_USER: mealplan
      POSTGRES_PASSWORD: mealplan
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mealplan"]
      interval: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://mealplan:mealplan@db:5432/mealplan
      ORIGIN: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
